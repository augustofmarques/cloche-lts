name: cloche-pro-gnome
description: "Cloche PRO (GNOME)"

base-image: ghcr.io/augustofmarques/cloche-pro
image-version: latest

modules:

  - type: os-release
    properties:
      #ID: cloche-pro
      NAME: Cloche PRO
      PRETTY_NAME: Cloche PRO 10 
      HOME_URL: https://github.com/augustofmarques/cloche
      BUG_REPORT_URL: https://github.com/augustofmarques/cloche/issues
      SUPPORT_URL: https://github.com/augustofmarques/cloche
      DEFAULT_HOSTNAME: cloche

  - type: files
    files:
      - source: system/usr
        destination: /usr
      - source: system/etc
        destination: /etc


  - type: dnf
    install:
      packages:
        - "@Workstation"
        - gdm
        #
        - cockpit
        - git
        - distrobox
        #- zsh
        - btop
        #- tailscale
        #- gnome-tweaks
        #- gnome-shell-extension-dash-to-panel
        #- gnome-shell-extension-blur-my-shell
        #- gnome-shell-extension-caffeine
        - fastfetch
        - plymouth-plugin-script

  - type: script
    snippets:
      - "scripts/setup-cloche-pro-gnome.sh"

  - type: containerfile
    snippets:
      - RUN grubby --update-kernel=ALL --args="nowatchdog random.trust_cpu=on console=tty0 quiet splash rhgb rd.udev.log_priority=3 vt.global_cursor_default=0 systemd.show_status=auto"
      - RUN flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo #&& \
            #flatpak install -y system flathub com.mattjakeman.ExtensionManager com.vscodium.codium org.gnome.Calculator org.gnome.TextEditor org.gnome.baobab org.gnome.Evince

  - type: systemd
    system:
      enabled:
        - gdm.service
        - NetworkManager.service