name: cloche-pro
description: "Cloche PRO"
base-image: quay.io/centos-bootc/centos-bootc
image-version: stream10

modules:
   
  - type: os-release
    properties:
      #ID: cloche-pro
      NAME: Cloche PRO
      PRETTY_NAME: Cloche PRO 10 
      HOME_URL: https://github.com/augustofmarques/cloche
      BUG_REPORT_URL: https://github.com/augustofmarques/cloche/issues
      SUPPORT_URL: https://github.com/augustofmarques/cloche
      DEFAULT_HOSTNAME: cloche

  - type: dnf
    install:
      packages:
        - fastfetch

  - type: containerfile
    snippets:
      - RUN dnf install -y epel-release && dnf config-manager --set-enabled crb
      - RUN useradd -G wheel -p '$6$CARQCg8vB3/aeGNE$UflWEmXw5MMr9Z0lG6OHudKXc.AYGFozzNIO0XwVxzDF2ppfBcPdlya0RT9zNWTU7wBMk/TfAPWSBs2DPtpwS1' user
      - RUN echo 'd /var/home/user 0700 user user - -' > /usr/lib/tmpfiles.d/user-home.conf
      - RUN sed -i 's/enabled=1/enabled=0/g' /etc/dnf/plugins/subscription-manager.conf

  #- type: systemd
    #system:
      #enabled:
        #- gdm.service
        #- NetworkManager.service
